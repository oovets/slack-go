name: slack-gui
arch: amd64
platform: linux
version: "${VERSION}"
section: default
priority: optional
maintainer: Slack GUI Maintainers <maintainers@example.com>
description: |
  Lightweight Slack desktop client built with Go and Fyne.
vendor: slack-gui
homepage: https://github.com/stefan/slack-gui
license: MIT
contents:
  - src: ./dist/slack-gui
    dst: /usr/bin/slack-gui
    file_info:
      mode: 0755
  - src: ./packaging/linux/slack-gui.desktop
    dst: /usr/share/applications/slack-gui.desktop
  - src: ./packaging/linux/icons/256x256/slack-gui.png
    dst: /usr/share/icons/hicolor/256x256/apps/slack-gui.png
  - src: ./packaging/linux/icons/512x512/slack-gui.png
    dst: /usr/share/icons/hicolor/512x512/apps/slack-gui.png
rpm:
  summary: Lightweight Slack desktop client
deb:
  fields:
    Bugs: https://github.com/stefan/slack-gui/issues
